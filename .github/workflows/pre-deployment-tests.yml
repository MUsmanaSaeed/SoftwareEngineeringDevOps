name: Pre-Deployment Test Suite

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  pre-deployment-tests:
    name: Pre-Deployment Test Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: |
          dotnet restore SoftwareEngineeringDevOps/SoftwareEngineeringDevOps.csproj
          dotnet restore SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj

      - name: Build solution
        run: |
          dotnet build SoftwareEngineeringDevOps/SoftwareEngineeringDevOps.csproj --configuration Release --no-restore
          dotnet build SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj --configuration Release --no-restore

      - name: Run all unit and integration tests
        run: |
          dotnet test SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=pre-deployment-test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName!~E2E" \
            -- RunConfiguration.FailOnError=true

      - name: Check test results
        if: always()
        run: |
          if [ -f "**/pre-deployment-test-results.trx" ]; then
            echo "Test results generated successfully"
          else
            echo "::error::Test results file not found"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pre-deployment-test-results
          path: |
            **/pre-deployment-test-results.trx
            **/coverage.cobertura.xml

      - name: Test report summary
        if: always()
        run: |
          echo "## Pre-Deployment Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All critical tests passed before deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Validation Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready for Render deployment" >> $GITHUB_STEP_SUMMARY

  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: pre-deployment-tests
    
    steps:
      - name: Deployment approved
        run: |
          echo "All tests passed. Deployment can proceed to Render."
          echo "## ✅ Deployment Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All automated tests completed successfully." >> $GITHUB_STEP_SUMMARY
          echo "Application is ready for deployment to Render." >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment status
        run: |
          echo "::notice::Pre-deployment tests passed. Ready for Render deployment."
