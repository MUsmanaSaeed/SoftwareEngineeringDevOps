name: Test Suite

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj

      - name: Build test project
        run: dotnet build SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName~UnitTests"

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/unit-test-results.trx'

      - name: Upload code coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: '**/coverage.cobertura.xml'

  integration-tests:
    name: Integration Tests (bUnit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj

      - name: Build test project
        run: dotnet build SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj --configuration Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --filter "FullyQualifiedName~IntegrationTests&FullyQualifiedName~Components"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/integration-test-results.trx'

  e2e-tests:
    name: End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies
        run: |
          dotnet restore SoftwareEngineeringDevOps/SoftwareEngineeringDevOps.csproj
          dotnet restore SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj

      - name: Build test project
        run: dotnet build SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj --configuration Release --no-restore

      - name: Install Playwright browsers
        run: npx -y playwright@1.60.0 install chromium --with-deps

      - name: Wait for Render deployment
        run: |
          echo "Waiting for Render deployment to start..."
          timeout 60 bash -c 'until curl -s "$BASE_URL" > /dev/null; do sleep 2; done' || exit 1
          echo "Application is running"
        env:
          BASE_URL: ${{ vars.RENDER_PR_BASE_URL }}

      - name: Run E2E tests
        run: |
          dotnet test SoftwareEngineeringDevOps.Tests/SoftwareEngineeringDevOps.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=e2e-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --filter "FullyQualifiedName~E2E"
        env:
          BASE_URL: ${{ vars.RENDER_PR_BASE_URL }}

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: '**/e2e-test-results.trx'

      - name: Upload E2E screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: '**/playwright-screenshots/**'

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Display test results structure
        run: |
          echo "Test results structure:"
          ls -R test-results/

      - name: Publish test summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All test suites executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests (bUnit): Completed" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests (Playwright): Completed" >> $GITHUB_STEP_SUMMARY
